<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário de Matrícula - FATEC</title>
</head>
<body>
  <header>
    <h1>Formulário de Matrícula - FATEC</h1>
  </header>
  <main>
    <form action="/matricula" method="POST">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" minlength="5" required />

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required />

        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento" name="nascimento" />

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" placeholder="000.000.000-00" />

        <label for="foto">Foto:</label>
        <input type="file" id="foto" name="foto" accept="image/*" />

        <label for="cor">Cor favorita:</label>
        <input type="color" id="cor" name="cor" />
      </fieldset>

      <fieldset>
        <legend>Dados Acadêmicos</legend>
        <label for="curso">Curso:</label>
        <select id="curso" name="curso">
          <option value="">Selecione...</option>
          <option value="ads">Análise e Desenvolvimento de Sistemas</option>
          <option value="redes">Redes de Computadores</option>
          <option value="si">Segurança da Informação</option>
        </select>

        <fieldset>
          <legend>Período:</legend>
          <label><input type="radio" name="periodo" value="manha" /> Manhã</label>
          <label><input type="radio" name="periodo" value="noite" /> Noite</label>
        </fieldset>

        <label>
          <input type="checkbox" name="experiencia" value="sim" />
          Possuo experiência prévia com programação
        </label>
      </fieldset>

      <label for="observacoes">Observações:</label>
      <textarea id="observacoes" name="observacoes" rows="4" placeholder="Escreva aqui..."></textarea>

      <button type="submit">Enviar Matrícula</button>
    </form>
  </main>
</body>
</html>
