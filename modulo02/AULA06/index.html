<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Model e Posicionamento</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Box Model e Posicionamento</h1>
  </header>
  <div class="container">
    <main>
      <h2>Produtos em Destaque</h2>
      <div class="cards">
        <div class="card">
          <span class="badge">Novo</span>
          <h3>Notebook</h3>
          <p>Alta performance para desenvolvimento.</p>
          <p class="preco">R$ 4.500,00</p>
        </div>
        <div class="card">
          <span class="badge">Oferta</span>
          <h3>Mouse Ergonômico</h3>
          <p>Conforto para longas horas de trabalho.</p>
          <p class="preco">R$ 89,00</p>
        </div>
        <div class="card">
          <h3>Teclado Mecânico</h3>
          <p>Digitação precisa e durável.</p>
          <p class="preco">R$ 250,00</p>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
