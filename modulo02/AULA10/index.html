<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animações e Transições CSS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Animações e Transições CSS</h1>
  </header>

  <main class="container">
    <section class="fade-in">
      <h2>Efeitos em Botões</h2>
      <div class="botoes">
        <button class="btn">Hover em mim</button>
        <button class="btn btn-secundario">Clique aqui</button>
      </div>
    </section>

    <section class="fade-in">
      <h2>Cards com Hover</h2>
      <div class="cards">
        <div class="card">
          <h3>Card 1</h3>
          <p>Passe o mouse sobre mim.</p>
        </div>
        <div class="card">
          <h3>Card 2</h3>
          <p>Veja o efeito de elevação.</p>
        </div>
        <div class="card">
          <h3>Card 3</h3>
          <p>Transição suave com transform.</p>
        </div>
      </div>
    </section>

    <section class="fade-in">
      <h2>Loader Animado</h2>
      <div class="loader"></div>
    </section>

    <section class="fade-in">
      <h2>Formulário</h2>
      <form>
        <input type="text" placeholder="Digite algo..." class="input" />
        <button type="submit" class="btn">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>FATEC 2026 - Animações e Transições</p>
  </footer>
</body>
</html>
