<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Alunos</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #059669; color: white; }
    .aprovado { color: green; font-weight: bold; }
    .reprovado { color: red; font-weight: bold; }
    h2 { margin-top: 24px; color: #059669; }
  </style>
</head>
<body>
  <h1>Gerenciador de Alunos</h1>
  <div id="resultado"></div>

  <script>
    const alunos = [
      { nome: "Ana Silva", nota1: 8.5, nota2: 7.0 },
      { nome: "Bruno Costa", nota1: 4.0, nota2: 5.5 },
      { nome: "Carlos Mendes", nota1: 9.0, nota2: 8.5 },
      { nome: "Diana Rocha", nota1: 6.0, nota2: 5.0 },
      { nome: "Eduardo Lima", nota1: 3.0, nota2: 4.5 },
    ];

    function calcularMedia(nota1, nota2) {
      return (nota1 + nota2) / 2;
    }

    const alunosComMedia = alunos.map(a => ({
      ...a,
      media: calcularMedia(a.nota1, a.nota2),
    }));

    const aprovados = alunosComMedia.filter(a => a.media >= 6);
    const reprovados = alunosComMedia.filter(a => a.media < 6);

    const mediaTurma = alunosComMedia.reduce((acc, a) => acc + a.media, 0) / alunosComMedia.length;

    const alunosOrdenados = [...alunosComMedia].sort((a, b) => b.media - a.media);

    console.log('=== Todos os alunos com média ===');
    alunosComMedia.forEach(a => console.log(`${a.nome} - Nota1: ${a.nota1}, Nota2: ${a.nota2}, Média: ${a.media.toFixed(1)}`));

    console.log('\n=== Aprovados ===');
    aprovados.forEach(a => console.log(`✔ ${a.nome} - Média: ${a.media.toFixed(1)}`));

    console.log('\n=== Reprovados ===');
    reprovados.forEach(a => console.log(`✘ ${a.nome} - Média: ${a.media.toFixed(1)}`));

    console.log(`\n=== Média geral da turma: ${mediaTurma.toFixed(2)} ===`);

    console.log('\n=== Alunos ordenados por média (maior → menor) ===');
    alunosOrdenados.forEach((a, i) => console.log(`${i + 1}º ${a.nome} - Média: ${a.media.toFixed(1)}`));

    function gerarTabela(lista) {
      return `
        <table>
          <thead>
            <tr><th>Nome</th><th>Nota 1</th><th>Nota 2</th><th>Média</th><th>Situação</th></tr>
          </thead>
          <tbody>
            ${lista.map(a => `
              <tr>
                <td>${a.nome}</td>
                <td>${a.nota1}</td>
                <td>${a.nota2}</td>
                <td>${a.media.toFixed(1)}</td>
                <td class="${a.media >= 6 ? 'aprovado' : 'reprovado'}">${a.media >= 6 ? 'Aprovado' : 'Reprovado'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    const resultado = document.getElementById('resultado');
    resultado.innerHTML = `
      <h2>Todos os Alunos (ordenados por média)</h2>
      ${gerarTabela(alunosOrdenados)}
      <h2>Aprovados (${aprovados.length})</h2>
      ${gerarTabela(aprovados)}
      <h2>Reprovados (${reprovados.length})</h2>
      ${gerarTabela(reprovados)}
      <h2>Média da Turma: ${mediaTurma.toFixed(2)}</h2>
    `;
  </script>
</body>
</html>
