<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .app { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { color: #0ea5e9; margin-bottom: 16px; }
    .form-adicionar { display: flex; gap: 8px; margin-bottom: 16px; }
    .form-adicionar input { flex: 1; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    .busca { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
    .btn { background: #0ea5e9; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #4f46e5; }
    ul { list-style: none; }
    li { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; gap: 8px; }
    li:last-child { border-bottom: none; }
    li span { flex: 1; }
    li.feito span { text-decoration: line-through; color: #aaa; }
    .btn-del { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }
    .btn-del:hover { background: #dc2626; }
    .oculto { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Lista de Tarefas</h1>
    <form id="formTarefa" class="form-adicionar">
      <input type="text" id="inputTarefa" placeholder="Nova tarefa..." required />
      <button type="submit" class="btn">Adicionar</button>
    </form>
    <input type="text" id="busca" class="busca" placeholder="Buscar tarefa..." />
    <ul id="listaTarefas"></ul>
  </div>

  <script>
    const form = document.getElementById('formTarefa');
    const inputTarefa = document.getElementById('inputTarefa');
    const lista = document.getElementById('listaTarefas');
    const busca = document.getElementById('busca');

    function salvar() {
      const tarefas = [];
      lista.querySelectorAll('li').forEach(li => {
        tarefas.push({ texto: li.querySelector('span').textContent, feita: li.classList.contains('feito') });
      });
      localStorage.setItem('tarefas', JSON.stringify(tarefas));
    }

    function adicionarTarefa(texto, feita = false) {
      const li = document.createElement('li');
      if (feita) li.classList.add('feito');
      li.innerHTML = `<span>${texto}</span><button class="btn-del">X</button>`;
      lista.appendChild(li);
      salvar();
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const texto = inputTarefa.value.trim();
      if (!texto) return;
      adicionarTarefa(texto);
      inputTarefa.value = '';
    });

    lista.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-del')) {
        e.target.closest('li').remove();
        salvar();
        return;
      }
      if (e.target.tagName === 'SPAN' || e.target.tagName === 'LI') {
        e.target.closest('li').classList.toggle('feito');
        salvar();
      }
    });

    busca.addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      lista.querySelectorAll('li').forEach(li => {
        const texto = li.querySelector('span').textContent.toLowerCase();
        li.classList.toggle('oculto', !texto.includes(termo));
      });
    });

    const tarefasSalvas = JSON.parse(localStorage.getItem('tarefas') || '[]');
    tarefasSalvas.forEach(t => adicionarTarefa(t.texto, t.feita));
  </script>
</body>
</html>
