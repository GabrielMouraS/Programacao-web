<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando APIs</title>
    <style>
        body {
            background-color: #e0e0e0;
            color: #1a1a1a;
            font-family: monospace;
            padding: 20px;
            margin: 0;
        }
        h3 {
            color: #333;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        pre {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <h1>Testando APIs</h1>
    <div id="app">Carregando...</div>

    <script>
        function mostrarNaTela(titulo, conteudo) {
            const app = document.getElementById('app');
            app.innerHTML += `<h3>${titulo}</h3><pre>${conteudo}</pre>`;
        }

        async function rodarTestes() {
            document.getElementById('app').innerHTML = '';

            try {
                const res1 = await fetch('https://jsonplaceholder.typicode.com/posts');
                const tipo = res1.headers.get('content-type');
                mostrarNaTela('1. Buscar vários posts (GET)', `Status: ${res1.status}\nTipo de dado: ${tipo}`);

                const res2 = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data2 = await res2.json();
                mostrarNaTela('2. Buscar só o post 1 (GET)', JSON.stringify(data2, null, 2));

                const res3 = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    body: JSON.stringify({ title: 'Teste', body: 'Texto do post', userId: 1 }),
                    headers: { 'Content-type': 'application/json; charset=UTF-8' },
                });
                const data3 = await res3.json();
                mostrarNaTela('3. Criar um post (POST)', `Status: ${res3.status} (Criado)\nResposta:\n${JSON.stringify(data3, null, 2)}`);

                const res4 = await fetch('https://jsonplaceholder.typicode.com/posts/99999');
                mostrarNaTela('4. Buscar post que não existe (GET)', `Status: ${res4.status} (Não encontrado)`);

                const rotasLoja = `
Produtos:
  GET    /produtos
  GET    /produtos/1
  POST   /produtos

Categorias:
  GET    /categorias
  GET    /categorias/5/produtos

Pedidos:
  GET    /pedidos
  POST   /pedidos
`;
                mostrarNaTela('5. Rotas de uma Loja', rotasLoja);

                const resCep = await fetch('https://viacep.com.br/ws/01001000/json/');
                const dataCep = await resCep.json();
                mostrarNaTela('6. Buscar CEP (ViaCEP)', `Método: GET\nStatus: ${resCep.status}\nFormato: JSON\nDados:\n${JSON.stringify(dataCep, null, 2)}`);

            } catch (erro) {
                mostrarNaTela('Erro', `Deu erro na busca: ${erro.message}`);
            }
        }

        rodarTestes();
    </script>

</body>
</html>
